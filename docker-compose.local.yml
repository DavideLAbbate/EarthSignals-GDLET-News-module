# Local development only — DB with bind-mount storage on disk.
# Start: docker-compose --env-file .env.local -f docker-compose.local.yml up -d
# Stop:  docker-compose -f docker-compose.local.yml down
# Data:  ./data/postgres (survives `down`, gitignored)
#
# NOTE: pass --env-file .env.local so docker-compose does NOT pick up the
# root .env (which points to Railway). Without it the fallback defaults below
# are still used, but credentials would come from .env if present.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gdelt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpass}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt_db}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gdelt_user} -d ${POSTGRES_DB:-gdelt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
